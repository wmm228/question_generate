<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- 柔和阴影 -->
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#6EE7B7" flood-opacity="0.4" />
    </filter>
    
    <!-- 声波现代渐变 -->
    <linearGradient id="soundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" /> <!-- 翡翠绿 -->
      <stop offset="100%" stop-color="#0EA5E9" /> <!-- 科技蓝 -->
    </linearGradient>

    <!-- 爱心渐变 -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
  </defs>

  <!-- 治愈且专注的薄荷绿背景 -->
  <rect width="500" height="500" rx="100" fill="#ECFDF5" />

  <!-- ================= 核心主体组 (整体向左平移 25px，给右侧留白) ================= -->
  <g transform="translate(-25, 0)" filter="url(#shadow3)">
    <animateTransform attributeName="transform" type="translate" values="-25,2; -25,-2; -25,2" dur="4s" repeatCount="indefinite" />

    <!-- 身体 -->
    <rect x="175" y="250" width="150" height="130" rx="60" fill="#FFFFFF" />
    
    <!-- 左手合上书本 (放在身体左下角) -->
    <g transform="translate(130, 280) rotate(-15)">
      <rect x="0" y="0" width="100" height="60" rx="8" fill="#A78BFA" />
      <rect x="5" y="10" width="90" height="10" fill="#FFFFFF" />
      <circle cx="50" cy="0" r="22" fill="#FFFFFF" />
    </g>

    <!-- ================= 头部整体组 (向右倾斜 6度) ================= -->
    <g transform="rotate(6, 250, 205)">
      <!-- 超大可爱的头部 -->
      <rect x="120" y="110" width="260" height="190" rx="85" fill="#FFFFFF" />
      
      <!-- 迷你博士帽 -->
      <g transform="translate(140, 60)">
        <polygon points="90,10 160,35 90,60 20,35" fill="#334155" />
        <polygon points="40,45 40,75 90,95 140,75 140,45 90,65" fill="#475569" />
        <path d="M 90 35 Q 160 30 170 70" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" />
        <path d="M 170 63 Q 170 75 182 75 Q 170 75 170 87 Q 170 75 158 75 Q 170 75 170 63 Z" fill="#FDE047" />
      </g>

      <!-- 脸部表情 -->
      <g>
        <!-- 脸颊红晕 -->
        <ellipse cx="165" cy="235" rx="15" ry="10" fill="#FECDD3" opacity="0.8" />
        <ellipse cx="335" cy="235" rx="15" ry="10" fill="#FECDD3" opacity="0.8" />
        
        <!-- 学霸眼镜 -->
        <g stroke="#0EA5E9" stroke-width="8" fill="none">
          <circle cx="195" cy="215" r="38" />
          <circle cx="305" cy="215" r="38" />
          <path d="M 233 215 L 267 215" stroke-linecap="round" />
        </g>

        <!-- 瞳孔 (向右看) -->
        <g fill="#1E293B">
          <circle cx="215" cy="215" r="16" />
          <circle cx="325" cy="215" r="16" />
        </g>
        <!-- 高光 -->
        <g fill="#FFFFFF">
          <circle cx="210" cy="208" r="6" />
          <circle cx="223" cy="220" r="3" />
          <circle cx="320" cy="208" r="6" />
          <circle cx="333" cy="220" r="3" />
        </g>

        <!-- 专注倾听的微张小嘴 -->
        <circle cx="265" cy="255" r="5" fill="#1E293B" />
      </g>

      <!-- 右手举起侧耳倾听 (去除了多余的线条，更加干净) -->
      <circle cx="395" cy="215" r="22" fill="#FFFFFF" />
    </g>
  </g>

  <!-- ================= 右侧：干净现代的声波与爱心 ================= -->
  
  <!-- 声波组 (放置在右侧留白处，互不干涉) -->
  <g transform="translate(440, 215)">
    <!-- 内侧声波 -->
    <path d="M -15 -25 Q -30 0 -15 25" fill="none" stroke="url(#soundGrad)" stroke-width="5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3; 1; 0.3" dur="1.5s" begin="0s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="1.5s" begin="0s" repeatCount="indefinite" additive="sum"/>
    </path>
    <!-- 中间声波 -->
    <path d="M 0 -40 Q -20 0 0 40" fill="none" stroke="url(#soundGrad)" stroke-width="6" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2; 0.8; 0.2" dur="1.5s" begin="0.2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="1.5s" begin="0.2s" repeatCount="indefinite" additive="sum"/>
    </path>
    <!-- 外侧声波 -->
    <path d="M 18 -55 Q -10 0 18 55" fill="none" stroke="url(#soundGrad)" stroke-width="7" stroke-linecap="round">
      <animate attributeName="opacity" values="0.1; 0.6; 0.1" dur="1.5s" begin="0.4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="1.5s" begin="0.4s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- 共情小爱心 (移至右上角空白区域，填补负空间，画面更平衡) -->
  <g transform="translate(415, 95)">
    <animateTransform attributeName="transform" type="translate" values="415,95; 415,85; 415,95" dur="3s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" values="1; 1.1; 1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
    <path d="M 0 0 C 0 -14, -18 -14, -18 0 L 0 18 L 18 0 C 18 -14, 0 -14, 0 0 Z" fill="url(#heartGrad)" opacity="0.9" />
  </g>

</svg>