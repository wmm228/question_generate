<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- 讲解状态明亮的黄色阴影 -->
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#FDE047" flood-opacity="0.8" />
    </filter>
    
    <!-- 灵感星芒渐变 -->
    <linearGradient id="star2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
  </defs>

  <!-- 灵光一闪的暖黄背景 -->
  <rect width="500" height="500" rx="100" fill="#FFFBEB" />

  <!-- 背景辐射线 (灵光一闪，强调正在输出知识) -->
  <g stroke="#FEF08A" stroke-width="6" stroke-linecap="round" opacity="0.6">
    <path d="M 250 50 L 250 80" /><path d="M 250 420 L 250 450" />
    <path d="M 50 250 L 80 250" /><path d="M 420 250 L 450 250" />
    <path d="M 110 110 L 130 130" /><path d="M 390 390 L 370 370" />
    <path d="M 390 110 L 370 130" /><path d="M 110 390 L 130 370" />
  </g>

  <!-- ================= 讲解中的活泼动画 (身体上下浮动) ================= -->
  <g filter="url(#shadow2)">
    <animateTransform attributeName="transform" type="translate" values="0,6; 0,-6; 0,6" dur="2s" repeatCount="indefinite" />

    <!-- 迷你博士帽 -->
    <g transform="translate(160, 60)">
      <polygon points="90,10 160,35 90,60 20,35" fill="#334155" />
      <polygon points="40,45 40,75 90,95 140,75 140,45 90,65" fill="#475569" />
      <path d="M 90 35 Q 160 30 170 70" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- 身体和头部 -->
    <rect x="175" y="250" width="150" height="130" rx="60" fill="#FFFFFF" />
    <rect x="120" y="110" width="260" height="190" rx="85" fill="#FFFFFF" />
    
    <!-- ================= 脸部表情 ================= -->
    <g>
      <!-- 兴奋的脸颊红晕 -->
      <ellipse cx="165" cy="225" rx="20" ry="14" fill="#FECDD3" opacity="0.9" />
      <ellipse cx="335" cy="225" rx="20" ry="14" fill="#FECDD3" opacity="0.9" />
      
      <!-- 学霸眼镜 -->
      <g stroke="#0EA5E9" stroke-width="8" fill="none">
        <circle cx="195" cy="215" r="38" />
        <circle cx="305" cy="215" r="38" />
        <path d="M 233 215 L 267 215" stroke-linecap="round" />
      </g>

      <!-- 开心的笑眼 ^ ^ -->
      <g stroke="#1E293B" stroke-width="6" stroke-linecap="round" fill="none">
        <path d="M 182 215 Q 195 195 208 215" />
        <path d="M 292 215 Q 305 195 318 215" />
      </g>

      <!-- ================= 完美兼容、支持无损缩小的动态嘴巴 ================= -->
      <g transform="translate(250, 245)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1 1; 0.6 0.2; 0.9 0.8; 0.7 0.4; 1.1 1.2; 0.5 0.1; 1 1" 
            dur="1.5s" 
            repeatCount="indefinite" 
          />
          <!-- 核心修改：描边与填充同色(纯粉红色)，缩小后绝对不会变黑 -->
          <path d="M -15 0 Q 0 25 15 0 Z" fill="#F43F5E" stroke="#F43F5E" stroke-width="4" stroke-linejoin="round" />
        </g>
      </g>
    </g>

    <!-- 右手抱着打开的魔法书/作业本 -->
    <g transform="translate(200, 310) scale(0.9)">
      <path d="M 70 80 C 30 70, 0 80, -10 110 L -10 40 C 0 10, 30 0, 70 10 Z" fill="#A78BFA" />
      <path d="M 70 80 C 110 70, 140 80, 150 110 L 150 40 C 140 10, 110 0, 70 10 Z" fill="#A78BFA" />
      <path d="M 70 72 C 35 62, 10 72, 0 95 L 0 35 C 10 15, 35 5, 70 15 Z" fill="#FFFFFF" />
      <path d="M 70 72 C 105 62, 130 72, 140 95 L 140 35 C 130 15, 105 5, 70 15 Z" fill="#FFFFFF" />
      <path d="M 70 15 L 70 75" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" />
      <path d="M 25 40 L 55 35" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
      <path d="M 85 35 L 115 40" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
    </g>
    <circle cx="340" cy="330" r="22" fill="#FFFFFF" />

    <!-- 左手高举铅笔当做教鞭 -->
    <g transform="translate(60, 130) rotate(15)">
      <animateTransform attributeName="transform" type="rotate" values="15; 20; 10; 15" dur="1.5s" repeatCount="indefinite" additive="sum"/>
      <polygon points="60,-10 75,-30 90,-10" fill="#FDE047" />
      <polygon points="70,-22 75,-30 80,-22" fill="#334155" />
      <rect x="60" y="-10" width="30" height="80" rx="4" fill="#FBBF24" />
      <rect x="60" y="70" width="30" height="15" rx="4" fill="#94A3B8" />
      <rect x="60" y="85" width="30" height="20" rx="8" fill="#F472B6" />
    </g>
    <circle cx="120" cy="220" r="22" fill="#FFFFFF" />
  </g>

  <!-- 左上角讲解高光AI星芒 -->
  <g transform="translate(80, 80)">
    <animateTransform attributeName="transform" type="scale" values="1; 1.3; 1" dur="1s" repeatCount="indefinite" additive="sum"/>
    <path d="M 0 -25 Q 0 0 25 0 Q 0 0 0 25 Q 0 0 -25 0 Q 0 0 0 -25 Z" fill="url(#star2)" />
  </g>
</svg>