
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
      <!-- Drop Shadows -->
      <filter id="ex-shadow-lg" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="8" dy="16" stdDeviation="12" flood-color="#8072e6" flood-opacity="0.25" />
      </filter>
      <filter id="ex-shadow-md" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#3d3775" flood-opacity="0.2" />
      </filter>
      <filter id="ex-shadow-sm" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#3d3775" flood-opacity="0.3" />
      </filter>
      <filter id="ex-glow-blue" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5599ff" flood-opacity="0.45" />
      </filter>
      <filter id="ex-glow-orange" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff8844" flood-opacity="0.4" />
      </filter>

      <!-- Paper Gradients -->
      <linearGradient id="ex-paper-back" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c1b6ff" />
        <stop offset="100%" stop-color="#9d8fff" />
      </linearGradient>
      <linearGradient id="ex-paper-front" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f8f7ff" />
        <stop offset="100%" stop-color="#e3ddff" />
      </linearGradient>

      <!-- Text Bar -->
      <linearGradient id="ex-text-bar" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5a52a5" />
        <stop offset="100%" stop-color="#3e3876" />
      </linearGradient>

      <!-- Star/Badge Circle (Blue/Indigo) -->
      <linearGradient id="ex-circle-outer" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7ab0ff" />
        <stop offset="100%" stop-color="#3366ee" />
      </linearGradient>
      <linearGradient id="ex-circle-inner" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#eef3ff" />
      </linearGradient>

      <!-- Pencil Gradients -->
      <linearGradient id="ex-pencil-top" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffe666" />
        <stop offset="100%" stop-color="#ffcd33" />
      </linearGradient>
      <linearGradient id="ex-pencil-side" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f5b800" />
        <stop offset="100%" stop-color="#d99800" />
      </linearGradient>
      <linearGradient id="ex-wood" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffe199" />
        <stop offset="100%" stop-color="#e6b955" />
      </linearGradient>

      <!-- Question mark gradient -->
      <linearGradient id="ex-qmark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7ab0ff" />
        <stop offset="100%" stop-color="#2255dd" />
      </linearGradient>
    </defs>

    <!-- Background Paper -->
    <g transform="translate(256, 256) rotate(10) translate(-256, -256)">
      <rect x="120" y="80" width="240" height="340" rx="30" fill="url(#ex-paper-back)" filter="url(#ex-shadow-lg)" />
    </g>

    <!-- Foreground Paper -->
    <g transform="translate(256, 256) rotate(-4) translate(-256, -256)">
      <rect x="100" y="90" width="270" height="360" rx="35" fill="url(#ex-paper-front)" filter="url(#ex-shadow-lg)" />

      <!-- Title bars -->
      <rect x="145" y="150" width="135" height="32" rx="16" fill="url(#ex-text-bar)" filter="url(#ex-shadow-sm)" />
      <rect x="145" y="200" width="85" height="32" rx="16" fill="url(#ex-text-bar)" filter="url(#ex-shadow-sm)" />

      <!-- Question lines (blue tint, blank areas to fill) -->
      <rect x="145" y="258" width="155" height="16" rx="8" fill="#c3bcff" opacity="0.6" />
      <!-- Answer blank line (dotted style via short rects) -->
      <rect x="145" y="290" width="30" height="14" rx="7" fill="#aab8ff" opacity="0.45" />
      <rect x="183" y="290" width="30" height="14" rx="7" fill="#aab8ff" opacity="0.45" />
      <rect x="221" y="290" width="30" height="14" rx="7" fill="#aab8ff" opacity="0.45" />
      <rect x="259" y="290" width="30" height="14" rx="7" fill="#aab8ff" opacity="0.45" />
      <rect x="145" y="318" width="155" height="14" rx="7" fill="#c3bcff" opacity="0.45" />
    </g>

    <!-- Blue circle badge with question mark -->
    <g transform="translate(260, 325)">
      <circle cx="0" cy="0" r="105" fill="url(#ex-circle-outer)" filter="url(#ex-shadow-md)" />
      <circle cx="0" cy="0" r="75" fill="url(#ex-circle-inner)" filter="url(#ex-shadow-sm)" />
      <!-- Question mark "?" -->
      <path d="M-18,-32 Q-18,-56 0,-56 Q20,-56 20,-38 Q20,-22 0,-16 L0,4"
        fill="none" stroke="url(#ex-qmark)" stroke-width="22" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#ex-glow-blue)" />
      <circle cx="0" cy="26" r="11" fill="url(#ex-qmark)" filter="url(#ex-glow-blue)" />
    </g>

    <!-- Yellow Pencil (writing/generating questions) -->
    <g transform="translate(345, 225) rotate(-38)">
      <!-- Metal band -->
      <path d="M-22,-70 L22,-70 L22,-40 L-22,-40 Z" fill="#473e8a" filter="url(#ex-shadow-sm)" />
      <!-- Eraser -->
      <path d="M-18,-90 L18,-90 L18,-70 L-18,-70 Z" fill="#ff7355" filter="url(#ex-shadow-sm)" />
      <path d="M-18,-90 Q0,-102 18,-90" fill="#ff7355" />
      <!-- Left face -->
      <path d="M-22,-40 L0,-40 L0,55 L-22,55 Z" fill="url(#ex-pencil-top)" filter="url(#ex-shadow-sm)" />
      <!-- Right face -->
      <path d="M0,-40 L22,-40 L22,55 L0,55 Z" fill="url(#ex-pencil-side)" filter="url(#ex-shadow-sm)" />
      <!-- Wood cone -->
      <path d="M-22,55 L22,55 L0,115 Z" fill="url(#ex-wood)" />
      <!-- Tip -->
      <path d="M-8,93 L8,93 L0,115 Z" fill="#473e8a" />
    </g>

    <!-- Decorative floating elements -->
    <g transform="translate(138, 355)">
      <path d="M0,-10 L0,10 M-10,0 L10,0" fill="none" stroke="#5599ff" stroke-width="5"
        stroke-linecap="round" filter="url(#ex-shadow-sm)" opacity="0.8" />
    </g>
    <g transform="translate(392, 138) scale(1.2)">
      <path d="M0,-8 L0,8 M-8,0 L8,0" fill="none" stroke="#ffcd33" stroke-width="4"
        stroke-linecap="round" filter="url(#ex-shadow-sm)" />
    </g>
    <g transform="translate(100, 238) scale(0.8)">
      <circle cx="0" cy="0" r="6" fill="#7ab0ff" filter="url(#ex-shadow-sm)" />
    </g>
  </svg>
