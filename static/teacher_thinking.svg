<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#94A3B8" flood-opacity="0.4" /></filter>
    <linearGradient id="star1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38BDF8" /><stop offset="100%" stop-color="#3B82F6" /></linearGradient>
  </defs>

  <!-- 冷静思考的蓝灰背景 -->
  <rect width="500" height="500" rx="100" fill="#F1F5F9" />

  <!-- 思考中的浮动动画 (缓慢平缓) -->
  <g filter="url(#shadow1)">
    <animateTransform attributeName="transform" type="translate" values="0,3; 0,-3; 0,3" dur="4s" repeatCount="indefinite" />

    <!-- 博士帽 -->
    <g transform="translate(160, 60)">
      <polygon points="90,10 160,35 90,60 20,35" fill="#334155" />
      <polygon points="40,45 40,75 90,95 140,75 140,45 90,65" fill="#475569" />
      <path d="M 90 35 Q 160 30 170 70" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" />
      <path d="M 170 63 Q 170 75 182 75 Q 170 75 170 87 Q 170 75 158 75 Q 170 75 170 63 Z" fill="url(#star1)" />
    </g>

    <!-- 身体和头部 -->
    <rect x="175" y="250" width="150" height="130" rx="60" fill="#FFFFFF" />
    <rect x="120" y="110" width="260" height="190" rx="85" fill="#FFFFFF" />
    
    <!-- 脸部 (向上看，思考状) -->
    <g>
      <ellipse cx="165" cy="230" rx="16" ry="10" fill="#FECDD3" opacity="0.6" />
      <ellipse cx="335" cy="230" rx="16" ry="10" fill="#FECDD3" opacity="0.6" />
      
      <!-- 眼镜 -->
      <g stroke="#0EA5E9" stroke-width="8" fill="none">
        <circle cx="195" cy="215" r="38" />
        <circle cx="305" cy="215" r="38" />
        <path d="M 233 215 L 267 215" stroke-linecap="round" />
      </g>

      <!-- 眼睛向上看 (向右上角偏移) -->
      <g fill="#1E293B">
        <circle cx="205" cy="205" r="14" />
        <circle cx="315" cy="205" r="14" />
      </g>
      <g fill="#FFFFFF">
        <circle cx="200" cy="200" r="5" />
        <circle cx="310" cy="200" r="5" />
      </g>

      <!-- 微微抿起的嘴巴 (思考中) -->
      <path d="M 245 255 Q 250 252 255 255" fill="none" stroke="#1E293B" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- 左手托着下巴/拿着铅笔点脑袋 -->
    <g transform="translate(140, 180) rotate(-20)">
      <polygon points="60,-10 75,-30 90,-10" fill="#FDE047" />
      <polygon points="70,-22 75,-30 80,-22" fill="#334155" />
      <rect x="60" y="-10" width="30" height="80" rx="4" fill="#FBBF24" />
      <rect x="60" y="70" width="30" height="15" rx="4" fill="#94A3B8" />
      <rect x="60" y="85" width="30" height="20" rx="8" fill="#F472B6" />
    </g>
    <circle cx="165" cy="275" r="22" fill="#FFFFFF" />

    <!-- 右手抱着合上的书 -->
    <circle cx="350" cy="330" r="22" fill="#FFFFFF" />
    <rect x="250" y="300" width="100" height="70" rx="8" fill="#A78BFA" transform="rotate(-15 250 300)" />
    <rect x="245" y="310" width="95" height="10" fill="#FFFFFF" transform="rotate(-15 250 300)" />
  </g>

  <!-- 思考气泡动画 (...) -->
  <g fill="#3B82F6" transform="translate(380, 100)">
    <circle cx="0" cy="0" r="6">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="20" cy="-10" r="8">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="45" cy="-25" r="10">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>