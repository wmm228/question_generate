
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
      <!-- Drop Shadows -->
      <filter id="qa-shadow-lg" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="8" dy="16" stdDeviation="12" flood-color="#8072e6" flood-opacity="0.25" />
      </filter>
      <filter id="qa-shadow-md" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#3d3775" flood-opacity="0.2" />
      </filter>
      <filter id="qa-shadow-sm" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#3d3775" flood-opacity="0.3" />
      </filter>
      <filter id="qa-glow-green" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#33cc88" flood-opacity="0.45" />
      </filter>
      <filter id="qa-glow-orange" x="-20%" y="-20%" width="150%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff8844" flood-opacity="0.4" />
      </filter>

      <!-- Paper Gradients -->
      <linearGradient id="qa-paper-back" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c1b6ff" />
        <stop offset="100%" stop-color="#9d8fff" />
      </linearGradient>
      <linearGradient id="qa-paper-front" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f8f7ff" />
        <stop offset="100%" stop-color="#e3ddff" />
      </linearGradient>

      <!-- Text Bar -->
      <linearGradient id="qa-text-bar" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5a52a5" />
        <stop offset="100%" stop-color="#3e3876" />
      </linearGradient>

      <!-- Answer Circle (Green) -->
      <linearGradient id="qa-circle-outer" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#55e0a0" />
        <stop offset="100%" stop-color="#22aa66" />
      </linearGradient>
      <linearGradient id="qa-circle-inner" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#efffF5" />
      </linearGradient>

      <!-- Check mark gradient -->
      <linearGradient id="qa-check" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff8f74" />
        <stop offset="100%" stop-color="#ff502a" />
      </linearGradient>

      <!-- Light bulb -->
      <linearGradient id="qa-bulb-body" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffe880" />
        <stop offset="100%" stop-color="#ffcc00" />
      </linearGradient>
      <linearGradient id="qa-bulb-base" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#bbb0ff" />
        <stop offset="100%" stop-color="#9a8dff" />
      </linearGradient>
    </defs>

    <!-- Background Paper -->
    <g transform="translate(256, 256) rotate(10) translate(-256, -256)">
      <rect x="120" y="80" width="240" height="340" rx="30" fill="url(#qa-paper-back)" filter="url(#qa-shadow-lg)" />
    </g>

    <!-- Foreground Paper -->
    <g transform="translate(256, 256) rotate(-4) translate(-256, -256)">
      <rect x="100" y="90" width="270" height="360" rx="35" fill="url(#qa-paper-front)" filter="url(#qa-shadow-lg)" />

      <!-- Title bars -->
      <rect x="145" y="150" width="135" height="32" rx="16" fill="url(#qa-text-bar)" filter="url(#qa-shadow-sm)" />
      <rect x="145" y="200" width="85" height="32" rx="16" fill="url(#qa-text-bar)" filter="url(#qa-shadow-sm)" />

      <!-- Q line (question) -->
      <rect x="145" y="258" width="155" height="16" rx="8" fill="#c3bcff" opacity="0.6" />
      <!-- A line (answer, green tint) -->
      <rect x="145" y="288" width="120" height="16" rx="8" fill="#88ddbb" opacity="0.6" />
      <rect x="145" y="318" width="90" height="16" rx="8" fill="#88ddbb" opacity="0.5" />
    </g>

    <!-- Answer circle (Green ring + Checkmark) -->
    <g transform="translate(260, 325)">
      <circle cx="0" cy="0" r="105" fill="url(#qa-circle-outer)" filter="url(#qa-shadow-md)" />
      <circle cx="0" cy="0" r="75" fill="url(#qa-circle-inner)" filter="url(#qa-shadow-sm)" />
      <!-- Checkmark -->
      <path d="M-40,5 L-12,35 L45,-38" fill="none" stroke="url(#qa-check)" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#qa-glow-orange)" />
    </g>

    <!-- Light Bulb (floating, representing solution/insight) -->
    <g transform="translate(345, 215)">
      <!-- Glow behind bulb -->
      <circle cx="0" cy="-10" r="45" fill="#ffee88" opacity="0.2" />
      <!-- Bulb body (rounded top) -->
      <path d="M-30,10 Q-32,-28 0,-42 Q32,-28 30,10 Z" fill="url(#qa-bulb-body)" filter="url(#qa-shadow-md)" />
      <!-- Bulb glass shine -->
      <ellipse cx="-8" cy="-28" rx="8" ry="10" fill="white" opacity="0.4" transform="rotate(-10)" />
      <!-- Filament lines -->
      <path d="M-10,2 Q-5,-8 0,2 Q5,-8 10,2" fill="none" stroke="#ff9a00" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
      <!-- Base segments -->
      <rect x="-20" y="10" width="40" height="10" rx="3" fill="url(#qa-bulb-base)" filter="url(#qa-shadow-sm)" />
      <rect x="-17" y="22" width="34" height="9" rx="3" fill="url(#qa-bulb-base)" filter="url(#qa-shadow-sm)" />
      <rect x="-13" y="33" width="26" height="9" rx="4" fill="url(#qa-bulb-base)" filter="url(#qa-shadow-sm)" />
      <!-- Base bottom pin -->
      <rect x="-5" y="42" width="10" height="10" rx="3" fill="#473e8a" />
    </g>

    <!-- Decorative floating elements -->
    <g transform="translate(138, 355)">
      <path d="M0,-10 L0,10 M-10,0 L10,0" fill="none" stroke="#ff7355" stroke-width="5"
        stroke-linecap="round" filter="url(#qa-shadow-sm)" opacity="0.8" />
    </g>
    <g transform="translate(392, 138) scale(1.2)">
      <path d="M0,-8 L0,8 M-8,0 L8,0" fill="none" stroke="#ffcd33" stroke-width="4"
        stroke-linecap="round" filter="url(#qa-shadow-sm)" />
    </g>
    <g transform="translate(100, 238) scale(0.8)">
      <circle cx="0" cy="0" r="6" fill="#55e0a0" filter="url(#qa-shadow-sm)" />
    </g>
  </svg>
