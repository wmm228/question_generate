services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=${OAH_POSTGRES_SHARED_BUFFERS:-128MB}
      - -c
      - effective_cache_size=${OAH_POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
      - -c
      - maintenance_work_mem=${OAH_POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      - -c
      - max_connections=${OAH_POSTGRES_MAX_CONNECTIONS:-80}
      - -c
      - wal_buffers=${OAH_POSTGRES_WAL_BUFFERS:-8MB}
    environment:
      POSTGRES_DB: open_agent_harness
      POSTGRES_USER: oah
      POSTGRES_PASSWORD: oah
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oah -d open_agent_harness"]
      interval: ${OAH_POSTGRES_HEALTHCHECK_INTERVAL:-15s}
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --hz
      - "5"
      - --dynamic-hz
      - "yes"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${OAH_REDIS_HEALTHCHECK_INTERVAL:-15s}
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: oahadmin
      MINIO_ROOT_PASSWORD: oahadmin123
      MINIO_REGION_NAME: us-east-1
      GOMEMLIMIT: ${OAH_MINIO_GOMEMLIMIT:-512MiB}
      GOMAXPROCS: ${OAH_MINIO_GOMAXPROCS:-2}
    command:
      - server
      - /data
      - --address
      - :9000
      - --console-address
      - :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: ${OAH_MINIO_HEALTHCHECK_INTERVAL:-15s}
      timeout: 5s
      retries: 20

  oah-api:
    image: openagentharness-oah-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ${OAH_DOCKER_API_TARGET:-api-runtime}
      args:
        BASE_BUILD_IMAGE: ${OAH_DOCKER_BUILD_BASE_IMAGE:-node:24-alpine}
        BASE_RUNTIME_IMAGE: ${OAH_DOCKER_RUNTIME_BASE_IMAGE:-alpine:3.22}
        BASE_DOCKER_CLI_IMAGE: ${OAH_DOCKER_CLI_BASE_IMAGE:-docker:cli}
        BASE_RUST_IMAGE: ${OAH_DOCKER_RUST_BASE_IMAGE:-rust:1.95-alpine}
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - --config
      - /config/server.docker.yaml
      - --api-only
    environment:
      NODE_OPTIONS: ${OAH_API_NODE_OPTIONS:---max-old-space-size=2048 --max-semi-space-size=32}
      OAH_ALLOW_PRIVATE_INTERNAL_MODEL_ROUTES: "true"
      OAH_INTERNAL_BASE_URL: "http://oah-api:8787"
      OAH_NATIVE_WORKSPACE_SYNC: ${OAH_NATIVE_WORKSPACE_SYNC:-1}
      OAH_NATIVE_WORKSPACE_SYNC_PERSISTENT: ${OAH_NATIVE_WORKSPACE_SYNC_PERSISTENT:-1}
      OAH_OBJECT_STORAGE_SYNC_BUNDLE_LAYOUT: ${OAH_OBJECT_STORAGE_SYNC_BUNDLE_LAYOUT:-primary}
      OAH_OBJECT_STORAGE_SYNC_TRUST_MANAGED_PREFIXES: ${OAH_OBJECT_STORAGE_SYNC_TRUST_MANAGED_PREFIXES:-1}
      OAH_DEPLOY_ROOT: ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}
      OAH_POSTGRES_POOL_MAX: ${OAH_API_POSTGRES_POOL_MAX:-5}
      OAH_REDIS_READY_QUEUE_READINESS_LIMIT: ${OAH_REDIS_READY_QUEUE_READINESS_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_INSPECT_LIMIT: ${OAH_REDIS_READY_QUEUE_INSPECT_LIMIT:-100}
      OAH_RUN_HEARTBEAT_INTERVAL_MS: ${OAH_RUN_HEARTBEAT_INTERVAL_MS:-5000}
      OAH_STALE_RUN_TIMEOUT_MS: ${OAH_STALE_RUN_TIMEOUT_MS:-120000}
      OAH_WORKSPACE_REGISTRY_POLL_INTERVAL_MS: ${OAH_WORKSPACE_REGISTRY_POLL_INTERVAL_MS:-30000}
      OAH_WORKSPACE_PREWARM_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OAH_DOCKER_API_CONFIG:?set OAH_DOCKER_API_CONFIG}:/config/server.docker.yaml:ro
      - ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}:${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}
      - oah-runtime-state:/data/runtime-state
      - oah-runtimes:/data/runtimes:ro
      - oah-models:/data/models:ro
      - oah-tools:/data/tools:ro
      - oah-skills:/data/skills:ro
      - oah-archives:/data/archives:ro

  oah-controller:
    image: openagentharness-oah-controller:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ${OAH_DOCKER_CONTROLLER_TARGET:-controller-runtime}
      args:
        BASE_BUILD_IMAGE: ${OAH_DOCKER_BUILD_BASE_IMAGE:-node:24-alpine}
        BASE_RUNTIME_IMAGE: ${OAH_DOCKER_RUNTIME_BASE_IMAGE:-alpine:3.22}
        BASE_DOCKER_CLI_IMAGE: ${OAH_DOCKER_CLI_BASE_IMAGE:-docker:cli}
        BASE_RUST_IMAGE: ${OAH_DOCKER_RUST_BASE_IMAGE:-rust:1.95-alpine}
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - --config
      - /config/server.docker.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      oah-compose-scaler:
        condition: service_healthy
    environment:
      NODE_OPTIONS: ${OAH_CONTROLLER_NODE_OPTIONS:---max-old-space-size=128 --max-semi-space-size=4}
      OAH_PROCESS_ROLE: "controller"
      OAH_POSTGRES_POOL_MAX: ${OAH_CONTROLLER_POSTGRES_POOL_MAX:-2}
      OAH_METADATA_RETENTION_ROLE: ${OAH_METADATA_RETENTION_ROLE:-auto}
      OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_INSPECT_LIMIT: ${OAH_REDIS_READY_QUEUE_INSPECT_LIMIT:-100}
      OAH_CONTROLLER_SCALE_INTERVAL_MS: ${OAH_CONTROLLER_SCALE_INTERVAL_MS:-5000}
    ports:
      - "8789:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OAH_DOCKER_CONTROLLER_CONFIG:?set OAH_DOCKER_CONTROLLER_CONFIG}:/config/server.docker.yaml:ro

  oah-compose-scaler:
    image: openagentharness-oah-compose-scaler:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ${OAH_DOCKER_COMPOSE_SCALER_TARGET:-compose-scaler-runtime}
      args:
        BASE_BUILD_IMAGE: ${OAH_DOCKER_BUILD_BASE_IMAGE:-node:24-alpine}
        BASE_RUNTIME_IMAGE: ${OAH_DOCKER_RUNTIME_BASE_IMAGE:-alpine:3.22}
        BASE_DOCKER_CLI_IMAGE: ${OAH_DOCKER_CLI_BASE_IMAGE:-docker:cli}
        BASE_RUST_IMAGE: ${OAH_DOCKER_RUST_BASE_IMAGE:-rust:1.95-alpine}
    restart: unless-stopped
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME}
      OAH_DOCKER_API_CONFIG: ${OAH_DOCKER_API_CONFIG:?set OAH_DOCKER_API_CONFIG}
      OAH_DOCKER_CONTROLLER_CONFIG: ${OAH_DOCKER_CONTROLLER_CONFIG:?set OAH_DOCKER_CONTROLLER_CONFIG}
      OAH_DOCKER_SANDBOX_CONFIG: ${OAH_DOCKER_SANDBOX_CONFIG:?set OAH_DOCKER_SANDBOX_CONFIG}
      OAH_COMPOSE_SCALER_AUTH_TOKEN: ${OAH_LOCAL_COMPOSE_SCALER_AUTH_TOKEN}
      OAH_COMPOSE_SCALER_COMPOSE_FILE: ${OAH_LOCAL_REPO_ROOT:?set OAH_LOCAL_REPO_ROOT}/docker-compose.local.yml
      OAH_COMPOSE_SCALER_PROJECT_NAME: ${COMPOSE_PROJECT_NAME}
      OAH_COMPOSE_SCALER_SERVICE: "oah-sandbox"
      OAH_COMPOSE_SCALER_COMMAND: "docker"
      OAH_LOCAL_COMPOSE_SCALER_AUTH_TOKEN: ${OAH_LOCAL_COMPOSE_SCALER_AUTH_TOKEN}
      OAH_LOCAL_DEPLOY_ROOT: ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}
      OAH_LOCAL_REPO_ROOT: ${OAH_LOCAL_REPO_ROOT:?set OAH_LOCAL_REPO_ROOT}
    expose:
      - "8790"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8790/healthz"
        ]
      interval: ${OAH_COMPOSE_SCALER_HEALTHCHECK_INTERVAL:-30s}
      timeout: 3s
      retries: 12
      start_period: 2s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OAH_LOCAL_REPO_ROOT:?set OAH_LOCAL_REPO_ROOT}:${OAH_LOCAL_REPO_ROOT:?set OAH_LOCAL_REPO_ROOT}:ro
      - ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}:${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}:ro

  oah-sandbox:
    image: openagentharness-oah-sandbox:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ${OAH_DOCKER_SANDBOX_TARGET:-worker-runtime}
      args:
        BASE_BUILD_IMAGE: ${OAH_DOCKER_BUILD_BASE_IMAGE:-node:24-alpine}
        BASE_RUNTIME_IMAGE: ${OAH_DOCKER_RUNTIME_BASE_IMAGE:-alpine:3.22}
        BASE_DOCKER_CLI_IMAGE: ${OAH_DOCKER_CLI_BASE_IMAGE:-docker:cli}
        BASE_RUST_IMAGE: ${OAH_DOCKER_RUST_BASE_IMAGE:-rust:1.95-alpine}
    restart: unless-stopped
    command:
      - node
      - dist/worker.js
      - --config
      - /config/server.docker.yaml
    environment:
      NODE_OPTIONS: ${OAH_SANDBOX_NODE_OPTIONS:---max-old-space-size=2048 --max-semi-space-size=32}
      OAH_EMBEDDED_WORKER_MIN: ${OAH_EMBEDDED_WORKER_MIN:-2}
      OAH_EMBEDDED_WORKER_MAX: ${OAH_EMBEDDED_WORKER_MAX:-4}
      OAH_EMBEDDED_WORKER_SCALE_INTERVAL_MS: ${OAH_EMBEDDED_WORKER_SCALE_INTERVAL_MS:-3000}
      OAH_ALLOW_PRIVATE_INTERNAL_ROUTES: "true"
      OAH_NATIVE_WORKSPACE_SYNC: ${OAH_NATIVE_WORKSPACE_SYNC:-1}
      OAH_NATIVE_WORKSPACE_SYNC_PERSISTENT: ${OAH_NATIVE_WORKSPACE_SYNC_PERSISTENT:-1}
      OAH_OBJECT_STORAGE_SYNC_BUNDLE_LAYOUT: ${OAH_OBJECT_STORAGE_SYNC_BUNDLE_LAYOUT:-primary}
      OAH_OBJECT_STORAGE_SYNC_TRUST_MANAGED_PREFIXES: ${OAH_OBJECT_STORAGE_SYNC_TRUST_MANAGED_PREFIXES:-1}
      OAH_DEPLOY_ROOT: ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}
      OAH_OBJECT_STORAGE_SYNC_MAX_OBJECTS: ${OAH_OBJECT_STORAGE_SYNC_MAX_OBJECTS:-50000}
      OAH_OBJECT_STORAGE_SYNC_MAX_BYTES: ${OAH_OBJECT_STORAGE_SYNC_MAX_BYTES:-4294967296}
      OAH_OBJECT_STORAGE_SYNC_MAX_FILE_BYTES: ${OAH_OBJECT_STORAGE_SYNC_MAX_FILE_BYTES:-536870912}
      OAH_POSTGRES_POOL_MAX: ${OAH_SANDBOX_POSTGRES_POOL_MAX:-3}
      OAH_REDIS_READY_QUEUE_READINESS_LIMIT: ${OAH_REDIS_READY_QUEUE_READINESS_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT: ${OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT:-100}
      OAH_REDIS_READY_QUEUE_INSPECT_LIMIT: ${OAH_REDIS_READY_QUEUE_INSPECT_LIMIT:-100}
      OAH_RUN_HEARTBEAT_INTERVAL_MS: ${OAH_RUN_HEARTBEAT_INTERVAL_MS:-5000}
      OAH_STALE_RUN_TIMEOUT_MS: ${OAH_STALE_RUN_TIMEOUT_MS:-120000}
      OAH_WORKSPACE_MATERIALIZATION_MAINTENANCE_INTERVAL_MS: ${OAH_WORKSPACE_MATERIALIZATION_MAINTENANCE_INTERVAL_MS:-60000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OAH_DOCKER_SANDBOX_CONFIG:?set OAH_DOCKER_SANDBOX_CONFIG}:/config/server.docker.yaml:ro
      - ${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}:${OAH_LOCAL_DEPLOY_ROOT:?set OAH_LOCAL_DEPLOY_ROOT}
      - /data/workspaces
      - oah-runtime-state:/data/runtime-state
      - oah-runtimes:/data/runtimes:ro
      - oah-models:/data/models:ro
      - oah-tools:/data/tools:ro
      - oah-skills:/data/skills:ro
      - oah-archives:/data/archives:ro

volumes:
  pgdata:
  redisdata:
  minio-data:
  oah-runtime-state:
  oah-runtimes:
    driver: rclone
    driver_opts:
      type: s3
      path: test-oah-server/runtime
      s3_provider: Minio
      s3_access_key_id: oahadmin
      s3_secret_access_key: oahadmin123
      s3_region: us-east-1
      s3_endpoint: http://host.docker.internal:9000
      s3_force_path_style: "true"
      vfs_cache_mode: "off"
      poll_interval: 0
  oah-models:
    driver: rclone
    driver_opts:
      type: s3
      path: test-oah-server/model
      s3_provider: Minio
      s3_access_key_id: oahadmin
      s3_secret_access_key: oahadmin123
      s3_region: us-east-1
      s3_endpoint: http://host.docker.internal:9000
      s3_force_path_style: "true"
      vfs_cache_mode: "off"
      poll_interval: 0
  oah-tools:
    driver: rclone
    driver_opts:
      type: s3
      path: test-oah-server/tool
      s3_provider: Minio
      s3_access_key_id: oahadmin
      s3_secret_access_key: oahadmin123
      s3_region: us-east-1
      s3_endpoint: http://host.docker.internal:9000
      s3_force_path_style: "true"
      vfs_cache_mode: "off"
      poll_interval: 0
  oah-skills:
    driver: rclone
    driver_opts:
      type: s3
      path: test-oah-server/skill
      s3_provider: Minio
      s3_access_key_id: oahadmin
      s3_secret_access_key: oahadmin123
      s3_region: us-east-1
      s3_endpoint: http://host.docker.internal:9000
      s3_force_path_style: "true"
      vfs_cache_mode: "off"
      poll_interval: 0
  oah-archives:
    driver: rclone
    driver_opts:
      type: s3
      path: test-oah-server/archive
      s3_provider: Minio
      s3_access_key_id: oahadmin
      s3_secret_access_key: oahadmin123
      s3_region: us-east-1
      s3_endpoint: http://host.docker.internal:9000
      s3_force_path_style: "true"
      vfs_cache_mode: "off"
      poll_interval: 0
