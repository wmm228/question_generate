openapi: 3.1.0
info:
  title: Open Agent Harness API
  version: 0.0.1
  summary: Headless distributed agent runtime API
  description: >
    Open Agent Harness is a headless agent runtime for multi-workspace,
    distributed usage. Identity, membership, and authentication are expected
    to be managed by an external service or upstream gateway. This document
    defines the HTTP API for workspace management, session messaging, run
    lifecycle, action invocation, and SSE event streaming.
servers:
  - url: http://localhost:8787/api/v1
    description: Local development
tags:
  - name: Workspaces
    description: >
      Workspace identity, catalog, lifecycle, and metadata APIs. This surface
      remains part of the public contract even though file and command flows
      are sandbox-scoped.
  - name: Sandboxes
    description: >
      Active execution-copy APIs. Sandbox semantics intentionally align with
      E2B, so file and command flows stay rooted under /sandboxes and expose
      /workspace as the in-sandbox root.
  - name: Files
    description: >
      File APIs operate on sandbox-scoped execution copies rather than
      workspace metadata. The /sandboxes + /workspace shape is a deliberate
      compatibility contract with E2B, not a temporary shim. The /workspaces
      API still remains for metadata, catalog, and lifecycle concerns.
  - name: Commands
    description: >
      Command execution APIs run inside the active sandbox context and follow
      the same sandbox-scoped contract as the file APIs.
  - name: Catalog
  - name: Models
  - name: System
  - name: Sessions
  - name: Messages
  - name: Runs
  - name: Actions
  - name: Events
paths:
  /healthz:
    get:
      tags: [Events]
      summary: Health report
      operationId: getHealthReport
      responses:
        '200':
          description: Process health and worker execution status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReport'
  /readyz:
    get:
      tags: [Events]
      summary: Readiness report
      operationId: getReadinessReport
      responses:
        '200':
          description: Process is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessReport'
        '503':
          description: Process is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessReport'
  /system/profile:
    get:
      tags: [System]
      summary: Get server deployment profile
      operationId: getSystemProfile
      responses:
        '200':
          description: OAH-compatible server profile and client capability flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runtimes:
    get:
      tags: [Workspaces]
      summary: List workspace runtimes
      operationId: listWorkspaceRuntimes
      responses:
        '200':
          description: Workspace runtime list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRuntimeList'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runtimes/upload:
    post:
      tags: [Workspaces]
      summary: Upload workspace runtime
      operationId: uploadWorkspaceRuntime
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - in: query
          name: overwrite
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Workspace runtime uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRuntimeUploadResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runtimes/{runtimeName}:
    put:
      tags: [Workspaces]
      summary: Update workspace runtime
      operationId: updateWorkspaceRuntime
      parameters:
        - in: path
          name: runtimeName
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Workspace runtime updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRuntimeUploadResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Workspaces]
      summary: Delete workspace runtime
      operationId: deleteWorkspaceRuntime
      parameters:
        - in: path
          name: runtimeName
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Workspace runtime deleted
        default:
          $ref: '#/components/responses/ErrorResponse'
  /model-providers:
    get:
      tags: [Models]
      summary: List supported model providers
      operationId: listModelProviders
      responses:
        '200':
          description: Supported model provider list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProviderList'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Workspace page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePage'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces/import:
    post:
      tags: [Workspaces]
      summary: Import an existing workspace directory
      operationId: importWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceImportRequest'
      responses:
        '201':
          description: Workspace imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /local/workspaces/register:
    post:
      tags: [Workspaces]
      summary: Register a local workspace path
      operationId: registerLocalWorkspace
      description: >
        Personal deployment endpoint for OAP local daemons. Servers must only
        enable this when their system profile advertises local workspace path
        registration capability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterLocalWorkspaceRequest'
      responses:
        '201':
          description: Local workspace registered or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /local/workspaces/{workspaceId}/repair:
    post:
      tags: [Workspaces]
      summary: Repair a local workspace path
      operationId: repairLocalWorkspace
      description: >
        Personal deployment endpoint for OAP local daemons. Rebinds an existing
        workspace id to a moved or renamed local repo path while preserving
        session, run, and message history associated with that workspace id.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairLocalWorkspaceRequest'
      responses:
        '200':
          description: Local workspace path repaired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      operationId: getWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Workspaces]
      summary: Delete workspace
      operationId: deleteWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '204':
          description: Workspace deleted
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces/{workspaceId}/catalog:
    get:
      tags: [Catalog]
      summary: Get workspace catalog
      operationId: getWorkspaceCatalog
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace-discovered capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCatalog'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes:
    post:
      tags: [Sandboxes]
      summary: Ensure a workspace-backed sandbox
      operationId: ensureSandboxForWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnsureSandboxForWorkspaceRequest'
      responses:
        '200':
          description: Existing sandbox resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '201':
          description: Sandbox created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}:
    get:
      tags: [Sandboxes]
      summary: Get sandbox metadata
      operationId: getSandbox
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      responses:
        '200':
          description: Sandbox metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/entries:
    get:
      tags: [Files]
      summary: List direct children of a sandbox directory
      operationId: listSandboxEntries
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/DirectoryPathQuery'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/EntrySortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Directory entry page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEntryPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/stat:
    get:
      tags: [Files]
      summary: Read sandbox file or directory metadata
      operationId: getSandboxFileStat
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/EntryPathQuery'
      responses:
        '200':
          description: File or directory metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxFileStat'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/entry:
    delete:
      tags: [Files]
      summary: Delete a sandbox file or directory
      operationId: deleteSandboxEntry
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/EntryPathQuery'
        - $ref: '#/components/parameters/Recursive'
      responses:
        '200':
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceDeleteResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/move:
    patch:
      tags: [Files]
      summary: Rename or move a sandbox file or directory
      operationId: moveSandboxEntry
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveWorkspaceEntryRequest'
      responses:
        '200':
          description: Entry moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEntry'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/content:
    get:
      tags: [Files]
      summary: Read sandbox file content
      operationId: getSandboxFileContent
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/EntryPathQuery'
        - $ref: '#/components/parameters/FileEncoding'
        - $ref: '#/components/parameters/MaxBytes'
      responses:
        '200':
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceFileContent'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Files]
      summary: Create or overwrite sandbox file content
      operationId: putSandboxFileContent
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutWorkspaceFileRequest'
      responses:
        '200':
          description: File written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEntry'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/upload:
    put:
      tags: [Files]
      summary: Upload raw file bytes into a sandbox path
      operationId: uploadSandboxFile
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/EntryPathQuery'
        - $ref: '#/components/parameters/UploadOverwrite'
        - $ref: '#/components/parameters/UploadIfMatch'
        - $ref: '#/components/parameters/UploadMtimeMs'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEntry'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/files/download:
    get:
      tags: [Files]
      summary: Download raw file bytes from a sandbox path
      operationId: downloadSandboxFile
      parameters:
        - $ref: '#/components/parameters/SandboxId'
        - $ref: '#/components/parameters/EntryPathQuery'
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/directories:
    post:
      tags: [Files]
      summary: Create a sandbox directory
      operationId: createSandboxDirectory
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceDirectoryRequest'
      responses:
        '201':
          description: Directory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEntry'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/commands/foreground:
    post:
      tags: [Commands]
      summary: Run a foreground shell command in the sandbox
      operationId: runSandboxForegroundCommand
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxCommandRequest'
      responses:
        '200':
          description: Command completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxCommandResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/commands/process:
    post:
      tags: [Commands]
      summary: Run a structured process in the sandbox
      operationId: runSandboxProcessCommand
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxProcessRequest'
      responses:
        '200':
          description: Process completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxCommandResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sandboxes/{sandboxId}/commands/background:
    post:
      tags: [Commands]
      summary: Launch a background command in the sandbox
      operationId: runSandboxBackgroundCommand
      parameters:
        - $ref: '#/components/parameters/SandboxId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxBackgroundCommandRequest'
      responses:
        '200':
          description: Background command accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxBackgroundCommandResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces/{workspaceId}/sessions:
    get:
      tags: [Sessions]
      summary: List workspace sessions
      operationId: listWorkspaceSessions
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Session page for a workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Sessions]
      summary: Create session
      operationId: createSession
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /workspaces/{workspaceId}/actions/{actionName}/runs:
    post:
      tags: [Actions]
      summary: Trigger action run
      operationId: triggerActionRun
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/ActionName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRunRequest'
      responses:
        '202':
          description: Action run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRunAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /internal/v1/models/generate:
    post:
      tags: [Models]
      summary: Generate text with an internal platform model
      description: >
        Internal local-only model runtime for actions, scripts, and the `oah model`
        CLI. This endpoint is only available from loopback addresses and is not
        intended for external clients or public network exposure.
      operationId: internalGenerateModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelGenerateRequest'
      responses:
        '200':
          description: Model generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelGenerateResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /internal/v1/models/stream:
    post:
      tags: [Models]
      summary: Stream text with an internal platform model
      description: >
        Internal local-only model runtime for actions, scripts, and the `oah model`
        CLI. This endpoint is only available from loopback addresses and is not
        intended for external clients or public network exposure.
      operationId: internalStreamModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelStreamRequest'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream of model response events
              examples:
                started:
                  summary: Response started event
                  value: |
                    event: response.started
                    data: {"model":"openai-default"}
                delta:
                  summary: Text delta event
                  value: |
                    event: text.delta
                    data: {"delta":"hello"}
                completed:
                  summary: Response completed event
                  value: |
                    event: response.completed
                    data: {"model":"openai-default","finishReason":"stop"}
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/messages:
    get:
      tags: [Messages]
      summary: List session messages
      operationId: listSessionMessages
      description: |
        Lists persisted session messages in chronological order.
        Use `direction=backward` to page from the latest message toward older history.
        `cursor` is an opaque keyset cursor derived from message position.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/MessageDirection'
      responses:
        '200':
          description: Message page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePage'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Messages]
      summary: Create session message and enqueue run
      operationId: createSessionMessage
      description: |
        Creates a user message and enqueues a new run.

        Default behavior is non-interrupting: if the session already has an active run,
        the new message still creates a queued run and waits for serial execution.
        Pass `runningRunBehavior: interrupt` to request cancellation of the active run first.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '202':
          description: Message accepted and run enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/messages/{messageId}:
    get:
      tags: [Messages]
      summary: Get a single session message
      operationId: getSessionMessage
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/messages/{messageId}/context:
    get:
      tags: [Messages]
      summary: Get message context around an anchor message
      operationId: getSessionMessageContext
      description: |
        Returns the anchor message together with a bounded window of messages
        immediately before and after it.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/MessagesBefore'
        - $ref: '#/components/parameters/MessagesAfter'
      responses:
        '200':
          description: Anchor message context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageContext'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/queue:
    get:
      tags: [Messages]
      summary: List queued session follow-up messages
      operationId: listSessionQueue
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Ordered service-side queue for the session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionQueue'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/compact:
    post:
      tags: [Messages]
      summary: Manually compact a session
      operationId: compactSession
      description: |
        Forces a compaction pass for the current session and persists
        `compact_boundary` / `compact_summary` artifacts when there is enough
        history to summarize. The request is rejected while the session still
        has an active run or queued follow-up work.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompactSessionRequest'
      responses:
        '200':
          description: Manual compaction completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCompactResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /sessions/{sessionId}/events:
    get:
      tags: [Events]
      summary: Subscribe to session SSE events
      operationId: streamSessionEvents
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/RunIdQuery'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream of session and run events
              examples:
                runStarted:
                  summary: Run started event
                  value: |
                    event: run.started
                    data: {"runId":"run_123","sessionId":"ses_123","status":"running"}
                tokenDelta:
                  summary: Token delta event
                  value: |
                    event: message.delta
                    data: {"runId":"run_123","messageId":"msg_456","delta":"hello"}
                toolCompleted:
                  summary: Tool completed event
                  value: |
                    event: tool.completed
                    data: {"runId":"run_123","callId":"tc_001","toolName":"code.review","sourceType":"action"}
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runs/{runId}:
    get:
      tags: [Runs]
      summary: Get run
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runs/{runId}/steps:
    get:
      tags: [Runs]
      summary: List run steps
      operationId: listRunSteps
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Run step page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStepPage'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runs/{runId}/cancel:
    post:
      tags: [Runs]
      summary: Cancel run
      operationId: cancelRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelRunAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /runs/{runId}/guide:
    post:
      tags: [Runs]
      summary: Promote a queued session message and interrupt active work
      operationId: guideQueuedRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '202':
          description: Guide request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideQueuedRunAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    SandboxId:
      name: sandboxId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    ActionName:
      name: actionName
      in: path
      required: true
      schema:
        type: string
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    MessageDirection:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum: [forward, backward]
        default: forward
    MessagesBefore:
      name: before
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 200
        default: 20
    MessagesAfter:
      name: after
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 200
        default: 20
    DirectoryPathQuery:
      name: path
      in: query
      required: false
      schema:
        type: string
        default: /workspace
    EntryPathQuery:
      name: path
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    UploadOverwrite:
      name: overwrite
      in: query
      required: false
      schema:
        type: boolean
        default: true
    UploadIfMatch:
      name: ifMatch
      in: query
      required: false
      schema:
        type: string
      description: Optimistic concurrency token. When provided, upload only succeeds if the current file etag matches.
    UploadMtimeMs:
      name: mtimeMs
      in: query
      required: false
      schema:
        type: number
        minimum: 0
      description: Optional modification timestamp in milliseconds to preserve for the uploaded file.
    EntrySortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
        enum: [name, updatedAt, sizeBytes, type]
        default: name
    SortOrder:
      name: sortOrder
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Recursive:
      name: recursive
      in: query
      required: false
      schema:
        type: boolean
        default: false
    FileEncoding:
      name: encoding
      in: query
      required: false
      schema:
        type: string
        enum: [utf8, base64]
        default: utf8
    MaxBytes:
      name: maxBytes
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    RunIdQuery:
      name: runId
      in: query
      required: false
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Timestamp:
      type: string
      format: date-time
    JsonObject:
      type: object
      additionalProperties: true
    WorkerMode:
      type: string
      enum: [embedded, external, disabled]
    WorkerProcessKind:
      type: string
      enum: [embedded, standalone]
    WorkerState:
      type: string
      enum: [starting, idle, busy, stopping]
    WorkerHealth:
      type: string
      enum: [healthy, late]
    HealthCheckStatus:
      type: string
      enum: [up, down, not_configured]
    RuntimeProcess:
      type: object
      required: [mode, label, execution]
      properties:
        mode:
          type: string
          enum: [api_embedded_worker, api_only, standalone_worker]
        label:
          type: string
          enum: ["API + embedded worker", "API only", "standalone worker"]
        execution:
          type: string
          enum: [redis_queue, local_inline, none]
      additionalProperties: false
    HealthStorage:
      type: object
      required: [primary, events, runQueue]
      properties:
        primary:
          type: string
          enum: [postgres, sqlite]
        events:
          type: string
          enum: [redis, memory]
        runQueue:
          type: string
          enum: [redis, in_process]
      additionalProperties: false
    WorkerLease:
      type: object
      required:
        - workerId
        - processKind
        - state
        - lastSeenAt
        - leaseTtlMs
        - expiresAt
        - lastSeenAgeMs
        - health
      properties:
        workerId:
          type: string
        processKind:
          $ref: '#/components/schemas/WorkerProcessKind'
        state:
          $ref: '#/components/schemas/WorkerState'
        lastSeenAt:
          $ref: '#/components/schemas/Timestamp'
        leaseTtlMs:
          type: integer
          minimum: 0
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
        lastSeenAgeMs:
          type: integer
          minimum: 0
        health:
          $ref: '#/components/schemas/WorkerHealth'
        currentSessionId:
          type: string
        currentRunId:
          type: string
        currentWorkspaceId:
          type: string
      additionalProperties: false
    WorkerSlot:
      type: object
      required: [slotId, workerId, processKind, state]
      properties:
        slotId:
          type: string
        workerId:
          type: string
        processKind:
          $ref: '#/components/schemas/WorkerProcessKind'
        state:
          $ref: '#/components/schemas/WorkerState'
        currentSessionId:
          type: string
        currentRunId:
          type: string
        currentWorkspaceId:
          type: string
      additionalProperties: false
    WorkerSummary:
      type: object
      required: [active, healthy, late, busy, embedded, standalone]
      properties:
        active:
          type: integer
          minimum: 0
        healthy:
          type: integer
          minimum: 0
        late:
          type: integer
          minimum: 0
        busy:
          type: integer
          minimum: 0
        embedded:
          type: integer
          minimum: 0
        standalone:
          type: integer
          minimum: 0
      additionalProperties: false
    WorkerPoolDecisionReason:
      type: string
      enum: [startup, steady, scale_up, scale_down, cooldown_hold, shutdown]
    WorkerPoolDecision:
      type: object
      required: [timestamp, reason, suggestedWorkers, desiredWorkers, activeWorkers]
      properties:
        timestamp:
          $ref: '#/components/schemas/Timestamp'
        reason:
          $ref: '#/components/schemas/WorkerPoolDecisionReason'
        suggestedWorkers:
          type: integer
          minimum: 0
        globalSuggestedWorkers:
          type: integer
          minimum: 0
        reservedSubagentCapacity:
          type: integer
          minimum: 0
        reservedWorkers:
          type: integer
          minimum: 0
        availableIdleCapacity:
          type: integer
          minimum: 0
        readySessionsPerActiveWorker:
          type: number
          minimum: 0
        subagentReserveTarget:
          type: integer
          minimum: 0
        subagentReserveDeficit:
          type: integer
          minimum: 0
        desiredWorkers:
          type: integer
          minimum: 0
        activeWorkers:
          type: integer
          minimum: 0
        busyWorkers:
          type: integer
          minimum: 0
        globalActiveWorkers:
          type: integer
          minimum: 0
        globalBusyWorkers:
          type: integer
          minimum: 0
        remoteActiveWorkers:
          type: integer
          minimum: 0
        remoteBusyWorkers:
          type: integer
          minimum: 0
        readySessionCount:
          type: integer
          minimum: 0
        readyQueueDepth:
          type: integer
          minimum: 0
        uniqueReadySessionCount:
          type: integer
          minimum: 0
        subagentReadySessionCount:
          type: integer
          minimum: 0
        subagentReadyQueueDepth:
          type: integer
          minimum: 0
        lockedReadySessionCount:
          type: integer
          minimum: 0
        staleReadySessionCount:
          type: integer
          minimum: 0
        oldestSchedulableReadyAgeMs:
          type: integer
          minimum: 0
      additionalProperties: false
    WorkerPool:
      type: object
      required:
        - running
        - processKind
        - sessionSerialBoundary
        - minWorkers
        - maxWorkers
        - suggestedWorkers
        - reservedSubagentCapacity
        - availableIdleCapacity
        - subagentReserveTarget
        - subagentReserveDeficit
        - desiredWorkers
        - slotCapacity
        - slots
        - activeWorkers
        - busySlots
        - idleSlots
        - busyWorkers
        - idleWorkers
        - readySessionsPerCapacityUnit
        - scaleIntervalMs
        - scaleUpCooldownMs
        - scaleDownCooldownMs
        - scaleUpSampleSize
        - scaleDownSampleSize
        - scaleUpBusyRatioThreshold
        - scaleUpMaxReadyAgeMs
        - scaleUpPressureStreak
        - scaleDownPressureStreak
        - scaleUpCooldownRemainingMs
        - scaleDownCooldownRemainingMs
        - recentDecisions
      properties:
        running:
          type: boolean
        processKind:
          $ref: '#/components/schemas/WorkerProcessKind'
        sessionSerialBoundary:
          type: string
          enum: [session]
        minWorkers:
          type: integer
          minimum: 0
        maxWorkers:
          type: integer
          minimum: 0
        suggestedWorkers:
          type: integer
          minimum: 0
        globalSuggestedWorkers:
          type: integer
          minimum: 0
        reservedSubagentCapacity:
          type: integer
          minimum: 0
        reservedWorkers:
          type: integer
          minimum: 0
        availableIdleCapacity:
          type: integer
          minimum: 0
        readySessionsPerActiveWorker:
          type: number
          minimum: 0
        subagentReserveTarget:
          type: integer
          minimum: 0
        subagentReserveDeficit:
          type: integer
          minimum: 0
        desiredWorkers:
          type: integer
          minimum: 0
        slotCapacity:
          type: integer
          minimum: 0
        slots:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSlot'
        activeWorkers:
          type: integer
          minimum: 0
        busySlots:
          type: integer
          minimum: 0
        idleSlots:
          type: integer
          minimum: 0
        busyWorkers:
          type: integer
          minimum: 0
        idleWorkers:
          type: integer
          minimum: 0
        globalActiveWorkers:
          type: integer
          minimum: 0
        globalBusyWorkers:
          type: integer
          minimum: 0
        remoteActiveWorkers:
          type: integer
          minimum: 0
        remoteBusyWorkers:
          type: integer
          minimum: 0
        readySessionsPerCapacityUnit:
          type: integer
          minimum: 1
          description: Primary queue-density target per observed capacity unit.
        scaleIntervalMs:
          type: integer
          minimum: 0
        scaleUpCooldownMs:
          type: integer
          minimum: 0
        scaleDownCooldownMs:
          type: integer
          minimum: 0
        scaleUpSampleSize:
          type: integer
          minimum: 1
        scaleDownSampleSize:
          type: integer
          minimum: 1
        scaleUpBusyRatioThreshold:
          type: number
          minimum: 0
          maximum: 1
        scaleUpMaxReadyAgeMs:
          type: integer
          minimum: 0
        readySessionCount:
          type: integer
          minimum: 0
        readyQueueDepth:
          type: integer
          minimum: 0
        uniqueReadySessionCount:
          type: integer
          minimum: 0
        subagentReadySessionCount:
          type: integer
          minimum: 0
        subagentReadyQueueDepth:
          type: integer
          minimum: 0
        lockedReadySessionCount:
          type: integer
          minimum: 0
        staleReadySessionCount:
          type: integer
          minimum: 0
        oldestSchedulableReadyAgeMs:
          type: integer
          minimum: 0
        lastRebalanceAt:
          $ref: '#/components/schemas/Timestamp'
        lastRebalanceReason:
          $ref: '#/components/schemas/WorkerPoolDecisionReason'
        scaleUpPressureStreak:
          type: integer
          minimum: 0
        scaleDownPressureStreak:
          type: integer
          minimum: 0
        scaleUpCooldownRemainingMs:
          type: integer
          minimum: 0
        scaleDownCooldownRemainingMs:
          type: integer
          minimum: 0
        recentDecisions:
          type: array
          items:
            $ref: '#/components/schemas/WorkerPoolDecision'
      additionalProperties: false
    HealthChecks:
      type: object
      required: [postgres, redisEvents, redisRunQueue]
      properties:
        postgres:
          $ref: '#/components/schemas/HealthCheckStatus'
        redisEvents:
          $ref: '#/components/schemas/HealthCheckStatus'
        redisRunQueue:
          $ref: '#/components/schemas/HealthCheckStatus'
      additionalProperties: false
    HealthWorker:
      type: object
      required: [mode, sessionSerialBoundary, localSlots, activeWorkers, summary, pool]
      properties:
        mode:
          $ref: '#/components/schemas/WorkerMode'
        sessionSerialBoundary:
          type: string
          enum: [session]
        localSlots:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSlot'
        activeWorkers:
          type: array
          items:
            $ref: '#/components/schemas/WorkerLease'
        summary:
          $ref: '#/components/schemas/WorkerSummary'
        pool:
          oneOf:
            - $ref: '#/components/schemas/WorkerPool'
            - type: 'null'
      additionalProperties: false
    SandboxTopology:
      type: object
      required: [provider, executionModel, workerPlacement]
      properties:
        provider:
          type: string
          enum: [embedded, self_hosted, e2b]
        executionModel:
          type: string
          enum: [local_embedded, sandbox_hosted]
        workerPlacement:
          type: string
          enum: [api_process, inside_sandbox]
      additionalProperties: false
    HealthReport:
      type: object
      required: [status, storage, process, sandbox, checks, worker]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        storage:
          $ref: '#/components/schemas/HealthStorage'
        process:
          $ref: '#/components/schemas/RuntimeProcess'
        sandbox:
          $ref: '#/components/schemas/SandboxTopology'
        checks:
          $ref: '#/components/schemas/HealthChecks'
        worker:
          $ref: '#/components/schemas/HealthWorker'
      additionalProperties: false
    ReadinessReport:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          $ref: '#/components/schemas/HealthChecks'
      additionalProperties: false
    SystemCapabilities:
      type: object
      required:
        - localDaemonControl
        - localWorkspacePaths
        - workspaceRegistration
        - storageInspection
        - modelManagement
        - localDaemonSupervisor
      properties:
        localDaemonControl:
          type: boolean
        localWorkspacePaths:
          type: boolean
        workspaceRegistration:
          type: boolean
        storageInspection:
          type: boolean
        modelManagement:
          type: boolean
        localDaemonSupervisor:
          type: boolean
      additionalProperties: false
    SystemProfile:
      type: object
      required:
        - apiCompatibility
        - product
        - edition
        - runtimeMode
        - deploymentKind
        - displayName
        - capabilities
      properties:
        apiCompatibility:
          type: string
          enum: [oah/v1]
        product:
          type: string
          enum: [open-agent-harness]
        edition:
          type: string
          enum: [enterprise, personal]
        runtimeMode:
          type: string
          enum: [daemon, embedded, compose, kubernetes, split]
        deploymentKind:
          type: string
          enum: [oah, oap]
        displayName:
          type: string
          minLength: 1
        capabilities:
          $ref: '#/components/schemas/SystemCapabilities'
      additionalProperties: false
    WorkspaceRuntime:
      type: object
      required: [name]
      properties:
        name:
          type: string
    WorkspaceRuntimeList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceRuntime'
    WorkspaceRuntimeUploadResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string
    ModelProvider:
      type: object
      required:
        - id
        - packageName
        - description
        - requiresUrl
        - useCases
      properties:
        id:
          type: string
          enum: [openai, openai-compatible]
        packageName:
          type: string
        description:
          type: string
        requiresUrl:
          type: boolean
        useCases:
          type: array
          items:
            type: string
      additionalProperties: false
    ModelProviderList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ModelProvider'
      additionalProperties: false
    Workspace:
      type: object
      required:
        - id
        - name
        - rootPath
        - executionPolicy
        - status
        - kind
        - readOnly
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        externalRef:
          type: string
        name:
          type: string
        runtime:
          type: string
          description: Preferred field for the workspace runtime name.
        rootPath:
          type: string
        executionPolicy:
          type: string
          enum: [local, container, remote_runner]
        status:
          type: string
          enum: [active, archived, disabled]
        kind:
          type: string
          enum: [project]
        readOnly:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    WorkspacePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        nextCursor:
          type: string
    Sandbox:
      type: object
      required:
        - id
        - workspaceId
        - provider
        - executionModel
        - workerPlacement
        - rootPath
        - name
        - kind
        - executionPolicy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        workspaceId:
          type: string
        provider:
          type: string
          enum: [embedded, self_hosted, e2b]
        executionModel:
          type: string
          enum: [local_embedded, sandbox_hosted]
        workerPlacement:
          type: string
          enum: [api_process, inside_sandbox]
        rootPath:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [project]
        executionPolicy:
          type: string
          enum: [local, container, remote_runner]
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        ownerWorkerId:
          type: string
        ownerBaseUrl:
          type: string
    WorkspaceEntry:
      type: object
      required:
        - path
        - name
        - type
        - readOnly
      properties:
        path:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [file, directory]
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        etag:
          type: string
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        readOnly:
          type: boolean
      additionalProperties: false
    WorkspaceEntryPage:
      type: object
      required:
        - workspaceId
        - path
        - items
      properties:
        workspaceId:
          type: string
        path:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceEntry'
        nextCursor:
          type: string
      additionalProperties: false
    WorkspaceFileContent:
      type: object
      required:
        - workspaceId
        - path
        - encoding
        - content
        - truncated
        - readOnly
      properties:
        workspaceId:
          type: string
        path:
          type: string
        encoding:
          type: string
          enum: [utf8, base64]
        content:
          type: string
        truncated:
          type: boolean
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        etag:
          type: string
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        readOnly:
          type: boolean
      additionalProperties: false
    WorkspaceDeleteResult:
      type: object
      required:
        - workspaceId
        - path
        - type
        - deleted
      properties:
        workspaceId:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        deleted:
          type: boolean
      additionalProperties: false
    SandboxFileStat:
      type: object
      required:
        - kind
        - size
        - mtimeMs
        - birthtimeMs
        - path
      properties:
        kind:
          type: string
          enum: [file, directory]
        size:
          type: integer
          minimum: 0
        mtimeMs:
          type: number
          minimum: 0
        birthtimeMs:
          type: number
          minimum: 0
        path:
          type: string
      additionalProperties: false
    AgentCatalogItem:
      type: object
      required: [name, source]
      properties:
        name:
          type: string
        source:
          type: string
          enum: [platform, workspace]
        description:
          type: string
    ModelCatalogItem:
      type: object
      required: [ref, name, source, provider]
      properties:
        ref:
          type: string
          pattern: '^(platform|workspace)/.+$'
        name:
          type: string
        source:
          type: string
          enum: [platform, workspace]
        provider:
          type: string
        modelName:
          type: string
        url:
          type: string
    ChatMessage:
      oneOf:
        - $ref: '#/components/schemas/SystemChatMessage'
        - $ref: '#/components/schemas/UserChatMessage'
        - $ref: '#/components/schemas/AssistantChatMessage'
        - $ref: '#/components/schemas/ToolChatMessage'
    SystemChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system]
        content:
          type: string
