site_name: Open Agent Harness
site_description: 面向企业级大规模 workspace 并行场景的自由 Agent Harness 文档站
site_url: !ENV [MKDOCS_SITE_URL, "http://127.0.0.1:8000/"]
repo_url: https://github.com/fairyshine/OpenAgentHarness
repo_name: fairyshine/OpenAgentHarness
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site
exclude_docs: /README.md
hooks:
  - docs/hooks/copy_localized_sitemaps.py

theme:
  name: material
  language: zh
  logo: assets/logo-mkdocs.png
  favicon: assets/logo-mkdocs.png
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
          link: /
          site_description: 面向企业级大规模 workspace 并行场景的自由 Agent Harness 文档站
          theme:
            language: zh
        - locale: en
          name: English
          build: true
          link: /en/
          site_description: Documentation for a flexible enterprise agent harness built for large-scale parallel workspace usage
          theme:
            language: en
          nav_translations:
            首页: Home
            快速开始: Quick Start
            部署与运行: Deploy and Run
            服务端配置: Server Config
            TUI: TUI
            设计总览: Overview
            术语约定: Terminology
            概念关系: Concept Relationships
            架构与设计: Architecture
            架构总览: Architecture Overview
            领域模型: Domain Model
            存储设计: Storage Design
            当前进度: Project Roadmap
            导航: Overview
            加载与校验: Loading and Validation
            生命周期: Lifecycle
            上下文引擎: Context Engine
            消息投影: Message Projections
            模型运行时: Model Runtime
            执行后端: Execution Backend
            Projection 与 Executors: Projection and Executors
            Queue 与可靠性: Queue and Reliability
            事件与审计: Events and Audit
            Worker 成熟化路线图: Worker Maturity Roadmap
            API 参考: API Reference
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 部署与运行: deploy.md
  - 服务端配置: server-config.md
  - TUI: tui.md
  - 设计总览: design-overview.md
  - 术语约定: terminology.md
  - 概念关系: concept-relationships.md
  - 架构与设计:
      - 架构总览: architecture-overview.md
      - 领域模型: domain-model.md
      - 存储设计: storage-design.md
      - 当前进度: project-roadmap.md
  - Workspace:
      - 导航: workspace/README.md
      - Settings: workspace/settings.md
      - Prompts: workspace/prompts.md
      - Agents: workspace/agents.md
      - Models: workspace/models.md
      - Providers: workspace/model-providers.md
      - Actions: workspace/actions.md
      - Skills: workspace/skills.md
      - Hooks: workspace/hooks.md
      - MCP: workspace/mcp.md
      - 加载与校验: workspace/loading-and-validation.md
  - Engine:
      - 导航: engine/README.md
      - 生命周期: engine/lifecycle.md
      - 上下文引擎: engine/context-engine.md
      - 消息投影: engine/message-projections.md
      - 模型运行时: engine/model-runtime.md
      - Projection 与 Executors: engine/projection-and-executors.md
      - 执行后端: engine/execution-backend.md
      - Hook Runtime: engine/hook-runtime.md
      - Queue 与可靠性: engine/queue-and-reliability.md
      - Worker 成熟化路线图: engine/worker-scaling-roadmap.md
      - 事件与审计: engine/events-and-audit.md
  - API 参考:
      - 导航: openapi/README.md
      - Workspaces: openapi/workspaces.md
      - Sessions: openapi/sessions.md
      - Runs: openapi/runs.md
      - Actions: openapi/actions.md
      - Files: openapi/files.md
      - Models: openapi/models.md
      - Streaming: openapi/streaming.md
      - Components: openapi/components.md
  - Schemas:
      - 导航: schemas/README.md
