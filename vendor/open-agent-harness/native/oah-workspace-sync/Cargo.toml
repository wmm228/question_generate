[package]
name = "oah-workspace-sync"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
aws-credential-types = "1.2.8"
aws-sdk-s3 = { version = "1.95.0", features = ["behavior-version-latest"] }
clap = { version = "4.5.39", features = ["derive"] }
filetime = "0.2.25"
reqwest = { version = "0.12.22", default-features = false, features = ["http2", "json", "rustls-tls"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha1 = "0.10.6"
tar = "0.4.44"
tempfile = "3.20.0"
time = { version = "0.3.41", features = ["formatting", "parsing"] }
tokio = { version = "1.48.0", features = ["fs", "io-util", "rt-multi-thread"] }
