server:
  host: 0.0.0.0
  port: 8787

storage:
  # Shared infra services running in the same Docker Compose project.
  postgres_url: postgres://oah:oah@postgres:5432/open_agent_harness
  redis_url: redis://redis:6379

object_storage:
  provider: s3
  bucket: test-oah-server
  region: us-east-1
  endpoint: http://minio:9000
  access_key: oahadmin
  secret_key: oahadmin123
  force_path_style: true
  workspace_backing_store:
    # Only workspace content is materialized into writable local runtime paths.
    enabled: true
    key_prefix: workspace

paths:
  # Writable runtime state lives on local Docker volumes.
  workspace_dir: /data/workspaces
  runtime_state_dir: /data/runtime-state
  # The remaining paths are read from rclone-mounted object storage volumes.
  runtime_dir: /data/runtimes
  model_dir: /data/models
  tool_dir: /data/tools
  skill_dir: /data/skills

workspace:
  materialization:
    # Flush + evict the active workspace copy after 30 minutes of idleness.
    idle_ttl_ms: 1800000
    # Check idle materialization cleanup every 15 seconds to reduce idle I/O.
    maintenance_interval_ms: 15000

workers:
  embedded:
    # Standalone sandbox workers use this pool internally. Keep local defaults
    # roomy enough for multi-run development, while still allowing env override.
    min_count: 2
    max_count: 4
    scale_interval_ms: 3000
    scale_up_window: 2
    scale_down_window: 3
    cooldown_ms: 4000
    reserved_capacity_for_subagent: 1
  standalone:
    min_replicas: 1
    max_replicas: 8
    ready_sessions_per_capacity_unit: 1
    reserved_capacity_for_subagent: 1
  controller:
    scale_interval_ms: 5000
    scale_up_window: 2
    scale_down_window: 4
    cooldown_ms: 10000
    scale_up_busy_ratio_threshold: 0.75
    scale_up_max_ready_age_ms: 5000

llm:
  # Define this model under source/models/ before deploying.
  default_model: openai-default
