name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$GITHUB_REF_NAME"
          fi
          case "$tag" in
            v*) ;;
            *) tag="v$tag" ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Check version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          tag="${{ steps.release.outputs.tag }}"
          tag="${tag#v}"
          if [ "$version" != "$tag" ]; then
            echo "Release tag v$tag does not match package version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -q -- '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check synced versions
        run: node ./scripts/sync-root-version.mjs --check

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native helpers
        run: pnpm native:build

      - name: Build release bundle
        env:
          OAH_INCLUDE_NODE: "1"
        run: pnpm build:release-bundle

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.name }}
          path: |
            release/*.tar.gz
            release/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          prerelease="${{ needs.verify.outputs.prerelease }}"
          release_flags=""
          if [ "$prerelease" = "true" ]; then
            release_flags="--prerelease"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* --verify-tag --title "$tag" --generate-notes $release_flags
          fi
