paths:
  workspace_dir: ./tmp/workspaces
  # runtime_state_dir defaults to a sibling ./.openharness directory when omitted.
  # runtime_state_dir: ./tmp/.openharness
  runtime_dir: ./tmp/runtimes
  model_dir: ./tests/fixtures/models
  tool_dir: ./tmp/tools
  skill_dir: ./tmp/skills

workers:
  embedded:
    min_count: 2
    max_count: 4
    scale_interval_ms: 1000
    idle_ttl_ms: 30000
    scale_up_window: 2
    scale_down_window: 2
    cooldown_ms: 1000
    reserved_capacity_for_subagent: 1
