apiVersion: v1
kind: ServiceAccount
metadata:
  name: oah-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oah-controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oah-controller
subjects:
  - kind: ServiceAccount
    name: oah-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oah-controller
