{{- if .Values.apiServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-agent-harness.apiServerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.apiServer.replicaCount }}
  minReadySeconds: {{ .Values.apiServer.minReadySeconds }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.apiServer.strategy.maxUnavailable }}
      maxSurge: {{ .Values.apiServer.strategy.maxSurge }}
  selector:
    matchLabels:
      {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
        {{- with .Values.apiServer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.apiServer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.apiServer.terminationGracePeriodSeconds }}
      {{- with .Values.apiServer.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.apiServer.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/index.js", "--config", "/etc/oah/server.yaml", "--api-only"]
          ports:
            - containerPort: {{ .Values.apiServer.service.port }}
              name: http
          env:
            - name: OAH_CONFIG
              value: {{ printf "%s/server.yaml" .Values.config.mountPath }}
            - name: NODE_OPTIONS
              value: {{ .Values.apiServer.nodeOptions | quote }}
            - name: OAH_ALLOW_PRIVATE_INTERNAL_MODEL_ROUTES
              value: {{ ternary "true" "false" .Values.apiServer.runtimeOptimizations.allowPrivateInternalModelRoutes | quote }}
            - name: OAH_WORKSPACE_PREWARM_ENABLED
              value: {{ ternary "true" "false" .Values.apiServer.runtimeOptimizations.workspacePrewarmEnabled | quote }}
            - name: OAH_OBJECT_STORAGE_SYNC_TRUST_MANAGED_PREFIXES
              value: {{ ternary "true" "false" .Values.apiServer.runtimeOptimizations.objectStorageTrustManagedPrefixes | quote }}
            - name: OAH_POSTGRES_POOL_MAX
              value: "5"
            - name: OAH_REDIS_READY_QUEUE_READINESS_LIMIT
              value: {{ .Values.prometheusRule.thresholds.redisReadyQueueDepth | quote }}
            - name: OAH_REDIS_READY_QUEUE_CLAIM_SCAN_LIMIT
              value: {{ .Values.redisReadyQueue.claimScanLimit | quote }}
            - name: OAH_REDIS_READY_QUEUE_PRESSURE_SCAN_LIMIT
              value: {{ .Values.redisReadyQueue.pressureScanLimit | quote }}
            - name: OAH_REDIS_READY_QUEUE_INSPECT_LIMIT
              value: {{ .Values.redisReadyQueue.inspectLimit | quote }}
            {{- with .Values.apiServer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.apiServer.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            {{- include "open-agent-harness.probe" (dict "probe" .Values.apiServer.readinessProbe) | nindent 12 }}
          livenessProbe:
            {{- include "open-agent-harness.probe" (dict "probe" .Values.apiServer.livenessProbe) | nindent 12 }}
          volumeMounts:
            - name: oah-config
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            {{- with .Values.apiServer.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.apiServer.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.apiServer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: oah-config
          configMap:
            name: {{ include "open-agent-harness.configName" . }}
        {{- with .Values.apiServer.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.apiServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-agent-harness.apiServerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
  {{- with .Values.apiServer.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.apiServer.service.type }}
  selector:
    {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.apiServer.service.port }}
      targetPort: http
{{- end }}
