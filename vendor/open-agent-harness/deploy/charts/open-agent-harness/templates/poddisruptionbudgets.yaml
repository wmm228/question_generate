{{- if and .Values.apiServer.enabled .Values.apiServer.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "open-agent-harness.apiServerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  {{- with .Values.apiServer.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.apiServer.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
---
{{- end }}
{{- if and .Values.worker.enabled .Values.worker.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "open-agent-harness.workerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "sandbox") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "sandbox") | nindent 6 }}
  {{- with .Values.worker.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.worker.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
---
{{- end }}
{{- if and .Values.controller.enabled .Values.controller.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "open-agent-harness.controllerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "open-agent-harness.componentSelectorLabels" (dict "root" . "component" "controller") | nindent 6 }}
  {{- with .Values.controller.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.controller.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
{{- end }}
