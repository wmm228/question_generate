{{- if .Values.config.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-agent-harness.configName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "config") | nindent 4 }}
data:
  server.yaml: |
{{ tpl .Values.config.serverYaml . | indent 4 }}
{{- end }}
