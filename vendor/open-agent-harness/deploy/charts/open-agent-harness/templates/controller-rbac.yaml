{{- if and .Values.controller.enabled .Values.controller.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "open-agent-harness.controllerServiceAccountName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
  {{- with .Values.controller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if and .Values.controller.enabled .Values.controller.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "open-agent-harness.controllerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "open-agent-harness.controllerName" . }}
  labels:
    {{- include "open-agent-harness.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "open-agent-harness.controllerServiceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "open-agent-harness.controllerName" . }}
{{- end }}
