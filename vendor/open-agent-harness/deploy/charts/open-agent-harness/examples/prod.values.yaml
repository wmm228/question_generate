image:
  tag: stable

commonLabels:
  environment: prod

objectStorage:
  enabled: true
  bucket: oah-prod-workspaces
  region: us-east-1
  # endpoint: https://s3.us-east-1.amazonaws.com
  workspaceBackingStore:
    enabled: true
    keyPrefix: workspaces

apiServer:
  replicaCount: 3
  priorityClassName: oah-api-critical
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: 32m
    hosts:
      - host: oah.example.com
        paths:
          - path: /
            pathType: Prefix
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: oah
          app.kubernetes.io/name: open-agent-harness
          app.kubernetes.io/component: api
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi
  envFrom:
    - secretRef:
        name: oah-object-storage-credentials

worker:
  replicaCount: 4
  terminationGracePeriodSeconds: 240
  drain:
    timeoutMs: 210000
    timeoutStrategy: requeue_running
    preStop:
      enabled: true
      delayMs: 10000
  priorityClassName: oah-worker-critical
  podDisruptionBudget:
    enabled: true
    minAvailable: 3
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: oah
          app.kubernetes.io/name: open-agent-harness
          app.kubernetes.io/component: sandbox
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
      ephemeral-storage: 32Gi
    limits:
      cpu: "8"
      memory: 8Gi
      ephemeral-storage: 64Gi
  envFrom:
    - secretRef:
        name: oah-object-storage-credentials
  diskReadiness:
    threshold: "0.92"
  workspacePolicy:
    maxObjects: "200000"
    maxBytes: "214748364800"
    maxFileBytes: "5368709120"
  workspaceVolume:
    type: persistentVolumeClaim
    persistentVolumeClaim:
      claimName: oah-prod-workspaces

controller:
  replicaCount: 2
  strategy:
    maxUnavailable: 0
    maxSurge: 1
  priorityClassName: oah-control-plane
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: oah
          app.kubernetes.io/name: open-agent-harness
          app.kubernetes.io/component: controller
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/oah-controller
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

serviceMonitor:
  enabled: true

prometheusRule:
  enabled: true

grafanaDashboard:
  enabled: true

networkPolicy:
  enabled: true
  monitoring:
    enabled: true
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
    podSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus
