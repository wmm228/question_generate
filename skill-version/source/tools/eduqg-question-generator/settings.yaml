name: eduqg-question-generation-agent
description: HTTP tool service for the migrated EDUQG question-generation agent.
transport:
  type: http
  base_url: http://127.0.0.1:8789
health:
  method: GET
  path: /health
openapi:
  method: GET
  path: /openapi.json
tools:
  - name: validate_question_spec
    description: Normalize and validate teacher-controlled fields before generation.
    method: POST
    path: /api/eduqg/validate
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: generate_visual_question
    description: Generate an image-grounded educational question with answer-relevant diagram content.
    method: POST
    path: /api/eduqg/generate-visual
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: run_evoq_text_question
    description: Run the EvoQ route for text question generation and quality-oriented optimization.
    method: POST
    path: /api/eduqg/run-evoq
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: render_question_image
    description: Render or return SVG diagram resources for generated visual questions.
    method: POST
    path: /api/eduqg/render-image
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: simulate_student_response
    description: Simulate a likely student answer and misconception for a generated item.
    method: POST
    path: /api/eduqg/simulate-student-response
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: evaluate_text_question
    description: Evaluate text-only question quality, structure, answer, and explanation.
    method: POST
    path: /api/eduqg/evaluate-text
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: evaluate_visual_question
    description: Evaluate visual question quality, diagram relevance, and SVG/render consistency.
    method: POST
    path: /api/eduqg/evaluate-visual
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: read_profile
    description: Read teacher or student profile hints used for personalized generation.
    method: POST
    path: /api/eduqg/read-profile
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: write_profile
    description: Write teacher or student profile hints after generation or feedback.
    method: POST
    path: /api/eduqg/write-profile
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
compatibility_tools:
  - name: generate_eduqg_question
    description: Backward-compatible generic generation endpoint retained for direct website integration.
    method: POST
    path: /api/eduqg/generate
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
  - name: dispatch_by_original_tool_name
    description: Generic dispatcher for original OAH tool names.
    method: POST
    path: /api/eduqg/tools/{toolName}
    input_schema: schemas/edu-question-spec.schema.json
    output_schema: schemas/eduqg-generation-result.schema.json
