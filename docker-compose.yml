services:
  oah:
    build:
      context: ./vendor/open-agent-harness
      dockerfile: Dockerfile.dev
    image: oah-dev:latest
    restart: unless-stopped
    environment:
      NODE_OPTIONS: "--max-old-space-size=8192"
      OAH_NATIVE_WORKSPACE_SYNC: "0"
      OAH_NATIVE_WORKSPACE_SYNC_PERSISTENT: "0"
    volumes:
      - ./oah/server.docker.yaml:/config/server.docker.yaml:ro
      - ./deploy/oah-deploy-root/source/models:/data/models:ro
      - ./deploy/oah-deploy-root/source/runtimes:/data/runtimes:ro
      - oah_agent_runtime_state:/data/runtime-state
      - oah_agent_workspace_data:/data/workspaces
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  tutor:
    build:
      context: .
      dockerfile: Dockerfile
    image: tutor-app:latest
    restart: unless-stopped
    env_file:
      - .env.docker
      - path: .env.docker.local
        required: false
    environment:
      NODE_ENV: production
      TUTOR_PORT: ${TUTOR_PORT:-7896}
    ports:
      - "${TUTOR_PORT:-7896}:7896"
    volumes:
      - tutor_runtime_state:/app/resources/runtime-state
      - tutor_logs:/app/logs
      - tutor_output:/app/output
    depends_on:
      oah:
        condition: service_healthy
      postgres:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - cloudflare
    env_file:
      - .env.docker
      - path: .env.docker.local
        required: false
    volumes:
      - ./cloudflared/config.yml:/cloudflared-config/config.yml:ro
      - ${CLOUDFLARED_DIR:-C:/Users/HP/.cloudflared}:/etc/cloudflared:ro
    command: tunnel --config /cloudflared-config/config.yml --no-autoupdate run ${CLOUDFLARED_TUNNEL_ID}
    depends_on:
      tutor:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.docker
      - path: .env.docker.local
        required: true
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  oah_agent_runtime_state:
  oah_agent_workspace_data:
  postgres_data:
  tutor_runtime_state:
  tutor_logs:
  tutor_output:
